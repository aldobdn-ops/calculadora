<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculadora.css">
    <script src="calculadora.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div class="container">
        <input type="text" class="screen" readonly />
        <input type="button" value="C" class="btn" id="btn-C"/>

        <div class="keys">
            <input type="button" value="7" class="btn" id="btn-7"/>
            <input type="button" value="8" class="btn" id="btn-8"/>
            <input type="button" value="9" class="btn" id="btn-9"/>

            <input type="button" value="/" class="btn" id="btndiv"/>
            <input type="button" value="4" class="btn" id="btn-4"/>
            <input type="button" value="5" class="btn"id="btn-5"/>
            <input type="button" value="6" class="btn"id="btn-6"/>

            <input type="button" value="*" class="btn" id="btnmulti" />
            <input type="button" value="1" class="btn" id="btn-1"/>
            <input type="button" value="2" class="btn" id="btn-2"/>
            <input type="button" value="3" class="btn" id="btn-3"/>

            <input type="button" value="-" class="btn" id="btnmenos"/>
            <input type="button" value="0" class="btn" id="btn-0"/>

            <input type="button" value="." class="btn" id="btnpunto"/>
            <input type="button" value="=" class="btn" id="btnigual"/>
            <input type="button" value="+" class="btn" id="btnmas"/>
        </div>
    </div>
</body>
</html>
